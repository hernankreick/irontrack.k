<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proof Add Exercise Clip</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1220;
      font-family: Inter, Arial, sans-serif;
      color: #e2e8f0;
      padding: 24px;
    }
    .modal {
      width: min(100%, 920px);
      border-radius: 16px;
      overflow: hidden;
      background: #334155;
      border: 1px solid rgba(148, 163, 184, 0.28);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }
    .header {
      padding: 18px 24px 0;
    }
    .title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 14px;
    }
    .search {
      width: 100%;
      height: 42px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      background: #1e293b;
      color: #e2e8f0;
      padding: 0 14px;
      margin-bottom: 16px;
    }
    .list {
      flex: 1;
      min-height: 0;
      min-width: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 14px 32px 20px;
      touch-action: pan-y;
      background: linear-gradient(180deg, rgba(148,163,184,0.06), rgba(148,163,184,0.02));
    }
    .card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      margin-bottom: 8px;
      margin-left: 1px;
      margin-right: 1px;
      border: 2px solid transparent;
      border-radius: 12px;
      background: #162234;
      color: #f8fafc;
      box-sizing: border-box;
    }
    .card.force-focus {
      outline: 2px solid rgba(37, 99, 235, 0.9);
      outline-offset: -2px;
      box-shadow: none;
    }
    .icon {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.12);
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 800;
      color: #22c55e;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .copy {
      flex: 1;
      min-width: 0;
    }
    .name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
    }
    .meta {
      font-size: 12px;
      font-weight: 700;
      color: #22c55e;
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-top: 4px;
      line-height: 1.3;
    }
    .submeta {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 2px;
      line-height: 1.35;
    }
    .bullet {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #64748b;
      margin-top: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="modal">
    <div class="header">
      <div class="title">Agregar ejercicios</div>
      <div class="subtitle">Prueba mínima para aislar clipping del viewport vs foco de la card.</div>
      <input class="search" value="Buscar..." />
    </div>
    <div id="list" class="list"></div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const overflowVisible = params.get("overflow") === "visible";
    const focusEnabled = params.get("focus") !== "off";

    const list = document.getElementById("list");
    list.style.overflowX = overflowVisible ? "visible" : "hidden";

    for (let i = 0; i < 5; i += 1) {
      const card = document.createElement("div");
      card.className = "card";
      if (i === 0 && focusEnabled) card.classList.add("force-focus");
      if (i === 0 && focusEnabled) card.tabIndex = 0;
      card.innerHTML = `
        <div class="icon">R</div>
        <div class="copy">
          <div class="name">Sentadilla con barra</div>
          <div class="meta">Rodilla</div>
          <div class="submeta">Cuádriceps · Barra</div>
        </div>
        <div class="bullet"></div>
      `;
      list.appendChild(card);
    }
  </script>
</body>
</html>
